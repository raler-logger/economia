<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InFormatics Store</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050810;
    --bg2: #090d1a;
    --surface: #0d1425;
    --surface2: #111827;
    --accent: #00d4ff;
    --accent2: #7b2fff;
    --accent3: #ff2f7b;
    --gold: #ffd700;
    --text: #e0eaff;
    --muted: #5a6a8a;
    --border: rgba(0,212,255,0.15);
    --glow: 0 0 20px rgba(0,212,255,0.4);
    --glow2: 0 0 20px rgba(123,47,255,0.4);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    overflow-x: hidden;
    cursor: default;
  }

  /* BACKGROUND GRID */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
    background-size: 50px 50px;
    pointer-events: none;
    z-index: 0;
  }

  /* NOISE TEXTURE */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  section, nav, footer, .hero { position: relative; z-index: 1; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 48px;
    background: rgba(5,8,16,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .nav-logo {
    font-family: 'Orbitron', monospace;
    font-size: 1.5rem;
    font-weight: 900;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }

  .nav-logo span {
    color: var(--accent3);
    -webkit-text-fill-color: var(--accent3);
  }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: color 0.3s;
    font-family: 'Share Tech Mono', monospace;
  }

  .nav-links a:hover { color: var(--accent); text-shadow: var(--glow); }

  .nav-cta {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff !important;
    -webkit-text-fill-color: #fff !important;
    padding: 8px 20px;
    border-radius: 4px;
    font-weight: 700 !important;
  }

  /* HERO */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 120px 24px 80px;
    position: relative;
    overflow: hidden;
  }

  .hero-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
  }

  .hero-orb-1 {
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,212,255,0.12) 0%, transparent 70%);
    top: -100px; left: -150px;
    animation: float 8s ease-in-out infinite;
  }

  .hero-orb-2 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(123,47,255,0.12) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    animation: float 10s ease-in-out infinite reverse;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-30px); }
  }

  .hero-badge {
    display: inline-block;
    background: rgba(0,212,255,0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    padding: 6px 16px;
    border-radius: 20px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 32px;
    animation: pulse-border 2s infinite;
  }

  @keyframes pulse-border {
    0%, 100% { box-shadow: 0 0 10px rgba(0,212,255,0.2); }
    50% { box-shadow: 0 0 25px rgba(0,212,255,0.5); }
  }

  .hero h1 {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2.5rem, 6vw, 5.5rem);
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 24px;
    letter-spacing: -1px;
  }

  .hero h1 .line1 {
    display: block;
    background: linear-gradient(90deg, #fff, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero h1 .line2 {
    display: block;
    background: linear-gradient(90deg, var(--accent2), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .hero-sub {
    font-size: 1.15rem;
    color: var(--muted);
    max-width: 560px;
    line-height: 1.7;
    margin-bottom: 48px;
    font-weight: 300;
  }

  .hero-btns {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #006aff);
    color: #fff;
    padding: 14px 36px;
    border-radius: 6px;
    text-decoration: none;
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 0 30px rgba(0,212,255,0.3);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 50px rgba(0,212,255,0.5);
  }

  .btn-ghost {
    background: transparent;
    color: var(--text);
    padding: 14px 36px;
    border-radius: 6px;
    text-decoration: none;
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.3s;
  }

  .btn-ghost:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    box-shadow: 0 0 20px rgba(123,47,255,0.2);
  }

  /* STATS */
  .stats {
    display: flex;
    gap: 48px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 72px;
    padding-top: 48px;
    border-top: 1px solid var(--border);
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 2rem;
    font-weight: 900;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .stat-label {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
    font-family: 'Share Tech Mono', monospace;
  }

  /* SECTIONS */
  section {
    padding: 100px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .section-tag {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.8rem, 3vw, 2.8rem);
    font-weight: 700;
    margin-bottom: 16px;
    line-height: 1.2;
  }

  .section-title span { color: var(--accent); }

  .section-sub {
    color: var(--muted);
    max-width: 500px;
    line-height: 1.7;
    margin-bottom: 60px;
  }

  /* PRODUCTS GRID */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
  }

  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    transition: all 0.4s;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .product-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,212,255,0.05), transparent);
    opacity: 0;
    transition: opacity 0.4s;
  }

  .product-card:hover {
    border-color: rgba(0,212,255,0.4);
    transform: translateY(-6px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 40px rgba(0,212,255,0.1);
  }

  .product-card:hover::before { opacity: 1; }

  .product-icon {
    font-size: 3rem;
    margin-bottom: 20px;
    display: block;
    filter: drop-shadow(0 0 10px rgba(0,212,255,0.3));
  }

  .product-category {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .product-name {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .product-desc {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .product-price {
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .product-price-sub {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .btn-buy {
    display: inline-block;
    width: 100%;
    text-align: center;
    background: rgba(0,212,255,0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 1px;
    transition: all 0.3s;
  }

  .btn-buy:hover {
    background: var(--accent);
    color: var(--bg);
    box-shadow: var(--glow);
  }

  .badge-hot {
    position: absolute;
    top: 16px; right: 16px;
    background: var(--accent3);
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 4px 10px;
    border-radius: 20px;
    letter-spacing: 1px;
  }

  /* DISCORD BOTS */
  #bots { background: var(--bg2); padding: 100px 0; }
  #bots > .inner { max-width: 1400px; margin: 0 auto; padding: 0 48px; }

  .plans-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 0;
  }

  @media (max-width: 900px) {
    .plans-grid { grid-template-columns: 1fr; }
    nav { padding: 16px 20px; }
    .nav-links { display: none; }
    section { padding: 60px 20px; }
    #bots > .inner { padding: 0 20px; }
  }

  .plan-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    text-align: center;
    position: relative;
    transition: all 0.4s;
    overflow: hidden;
  }

  .plan-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--plan-color, var(--accent)), transparent);
    opacity: 0;
    transition: opacity 0.3s;
  }

  .plan-card:hover::after { opacity: 1; }
  .plan-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 50px color-mix(in srgb, var(--plan-color, var(--accent)) 15%, transparent);
    border-color: color-mix(in srgb, var(--plan-color, var(--accent)) 50%, transparent);
  }

  .plan-card.featured {
    border-color: var(--accent2);
    background: linear-gradient(135deg, var(--surface) 0%, rgba(123,47,255,0.08) 100%);
    transform: scale(1.03);
  }

  .plan-card.featured::after { opacity: 1; --plan-color: var(--accent2); }

  .plan-featured-badge {
    position: absolute;
    top: -1px; left: 50%; transform: translateX(-50%);
    background: var(--accent2);
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    padding: 4px 16px;
    border-radius: 0 0 8px 8px;
    letter-spacing: 2px;
    white-space: nowrap;
  }

  .plan-icon { font-size: 2.5rem; margin-bottom: 16px; }

  .plan-name {
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .plan-price {
    font-family: 'Orbitron', monospace;
    font-size: 2.8rem;
    font-weight: 900;
    margin: 20px 0 4px;
    background: linear-gradient(90deg, var(--plan-color, var(--accent)), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .plan-period {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 28px;
    font-family: 'Share Tech Mono', monospace;
  }

  .plan-features {
    list-style: none;
    margin-bottom: 32px;
    text-align: left;
  }

  .plan-features li {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 0.9rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Rajdhani', sans-serif;
  }

  .plan-features li .check {
    color: var(--accent);
    font-size: 1rem;
    flex-shrink: 0;
  }

  .plan-basic { --plan-color: #4ade80; }
  .plan-mid { --plan-color: var(--accent); }
  .plan-pro { --plan-color: var(--accent2); }

  .btn-plan {
    display: block;
    width: 100%;
    padding: 14px;
    border-radius: 8px;
    text-decoration: none;
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.3s;
    border: none;
    cursor: pointer;
  }

  .btn-plan-basic {
    background: rgba(74,222,128,0.1);
    border: 1px solid #4ade80;
    color: #4ade80;
  }
  .btn-plan-basic:hover { background: #4ade80; color: #000; box-shadow: 0 0 30px rgba(74,222,128,0.3); }

  .btn-plan-mid {
    background: rgba(0,212,255,0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  .btn-plan-mid:hover { background: var(--accent); color: #000; box-shadow: var(--glow); }

  .btn-plan-pro {
    background: linear-gradient(135deg, var(--accent2), var(--accent3));
    color: #fff;
    border: none;
  }
  .btn-plan-pro:hover { transform: scale(1.03); box-shadow: 0 0 40px rgba(123,47,255,0.5); }

  /* PAYPAL BANNER */
  .paypal-banner {
    background: linear-gradient(135deg, #0070ba 0%, #003087 100%);
    border-radius: 16px;
    padding: 40px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
    margin: 60px 0 0;
    border: 1px solid rgba(0,112,186,0.4);
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .paypal-info h3 {
    font-family: 'Orbitron', monospace;
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .paypal-info p {
    color: rgba(255,255,255,0.7);
    font-size: 0.9rem;
  }

  .btn-paypal {
    background: #ffc439;
    color: #003087;
    padding: 14px 36px;
    border-radius: 50px;
    text-decoration: none;
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    font-weight: 900;
    letter-spacing: 1px;
    white-space: nowrap;
    transition: all 0.3s;
    box-shadow: 0 4px 20px rgba(255,196,57,0.3);
  }

  .btn-paypal:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 40px rgba(255,196,57,0.5);
  }

  /* DIVIDER */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 0 48px;
  }

  /* FOOTER */
  footer {
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 60px 48px 40px;
    position: relative;
    z-index: 1;
  }

  .footer-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 48px;
    max-width: 1400px;
    margin: 0 auto 48px;
  }

  @media (max-width: 768px) {
    .footer-grid { grid-template-columns: 1fr; }
    footer { padding: 40px 20px; }
  }

  .footer-brand p {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.7;
    margin-top: 12px;
    max-width: 300px;
  }

  .footer-col h4 {
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 20px;
    text-transform: uppercase;
  }

  .footer-col ul { list-style: none; }
  .footer-col ul li { margin-bottom: 10px; }
  .footer-col ul a {
    color: var(--muted);
    text-decoration: none;
    font-size: 0.9rem;
    transition: color 0.3s;
  }
  .footer-col ul a:hover { color: var(--accent); }

  .footer-bottom {
    max-width: 1400px;
    margin: 0 auto;
    padding-top: 32px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: gap;
    gap: 16px;
  }

  .footer-bottom p {
    color: var(--muted);
    font-size: 0.8rem;
    font-family: 'Share Tech Mono', monospace;
  }

  .footer-bottom a { color: var(--accent); text-decoration: none; }

  /* COOKIE BANNER */
  #cookie-banner {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    width: min(680px, calc(100vw - 32px));
    background: rgba(9,13,26,0.97);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    z-index: 9999;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 40px rgba(0,212,255,0.05);
    transition: all 0.5s;
    flex-wrap: wrap;
  }

  #cookie-banner.hidden {
    opacity: 0;
    transform: translateX(-50%) translateY(120%);
    pointer-events: none;
  }

  .cookie-icon { font-size: 2rem; flex-shrink: 0; }

  .cookie-text { flex: 1; min-width: 200px; }
  .cookie-text strong {
    font-family: 'Orbitron', monospace;
    font-size: 0.85rem;
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
  }
  .cookie-text p {
    font-size: 0.82rem;
    color: var(--muted);
    line-height: 1.5;
  }
  .cookie-text a { color: var(--accent); text-decoration: none; }

  .cookie-btns { display: flex; gap: 12px; flex-wrap: wrap; }

  .btn-cookie-accept {
    background: linear-gradient(135deg, var(--accent), #006aff);
    color: #fff;
    border: none;
    padding: 10px 24px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Orbitron', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 1px;
    white-space: nowrap;
    transition: all 0.3s;
  }

  .btn-cookie-accept:hover { box-shadow: var(--glow); transform: scale(1.02); }

  .btn-cookie-reject {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 10px 20px;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    white-space: nowrap;
    transition: all 0.3s;
  }

  .btn-cookie-reject:hover { color: var(--text); border-color: var(--muted); }

  /* SCROLL ANIMATIONS */
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  /* SEPARATOR LINE */
  .sep-line {
    width: 60px; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    margin-bottom: 32px;
  }
